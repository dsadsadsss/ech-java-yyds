# ws-proxy configuration
# Priority: this file > environment variable > built-in default
#
# Uncomment and edit any value you want to override.
# Lines starting with '#' are comments and are ignored.

# ── Network ──────────────────────────────────────────────────────
# Listening port.
# Env equivalents (in priority order): SERVER_PORT, PORT
# port=3000

# WebSocket sub-protocol token used for authentication.
# Set to empty string to disable auth: token=
# Env: TOKEN
token=123


# ── Logging ──────────────────────────────────────────────────────
# true  → show real proxy logs
# false → print fake PaperMC startup output (disguise mode)
# Env: LOG
log=false
